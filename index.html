*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(180deg,#052e1f,#064e34);color:#fffbeb;min-height:100vh;overflow-x:hidden}
.hdr{padding:24px 16px 16px;text-align:center}
.hdr .sub{color:#fbbf24;font-size:11px;letter-spacing:3px;text-transform:uppercase}
.hdr h1{font-size:28px;font-weight:900;letter-spacing:-0.5px}
.hdr h1 span{color:#fbbf24}

nav{position:sticky;top:0;z-index:10;display:flex;justify-content:center;gap:4px;padding:8px;background:rgba(5,46,31,0.95);border-bottom:1px solid #065f46;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{padding:6px 16px;border-radius:99px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:transparent;color:#a7f3d0;transition:background 0.2s;flex-shrink:0;white-space:nowrap}
nav button.active{background:#fbbf24;color:#052e1f}
nav button:hover:not(.active){background:#064e34}
.main{max-width:640px;margin:0 auto;padding:12px 12px 64px}
.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:16px}
.chip{border-radius:99px;padding:6px 16px;font-size:13px;font-weight:700}
.chip.g{background:#fbbf24;color:#052e1f}.chip.s{background:#d1d5db;color:#052e1f}.chip.b{background:#92400e;color:#fffbeb}
.tbl{border-radius:12px;overflow:hidden;border:1px solid #065f46}
.thead{display:grid;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#6ee7b7;background:#064e34;padding:8px 12px}
.trow{display:grid;align-items:center;padding:8px 12px;font-size:14px}
.trow:nth-child(odd){background:rgba(6,78,52,0.4)}
.pos{font-family:monospace;color:#6ee7b7;font-size:13px}
.name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pts{text-align:right;font-family:monospace;font-weight:700;color:#fcd34d}
.bon,.crav{text-align:right;font-family:monospace;color:#a7f3d0}
.bl1{border-left:4px solid #fbbf24}.bl2{border-left:4px solid #d1d5db}.bl3{border-left:4px solid #92400e}.bl0{border-left:4px solid transparent}
.wabtn{margin-top:16px;width:100%;padding:10px;background:#065f46;border:1px solid #047857;border-radius:12px;color:#fffbeb;font-size:14px;font-weight:600;cursor:pointer}
.wabtn:hover{background:#047857}
.note{font-size:11px;color:#34d399;text-align:center;margin-top:12px}
.sel{background:#052e1f;border:1px solid #047857;color:#fffbeb;border-radius:6px;padding:6px 8px;font-size:14px}

.match{border-radius:8px;background:rgba(6,78,52,0.5);border:1px solid #065f46;padding:8px 12px;margin-bottom:8px}
.mhdr{display:flex;justify-content:space-between;font-size:12px;color:#6ee7b7;margin-bottom:4px}
.mpts{color:#fcd34d;font-family:monospace;font-weight:700}
.mbody{display:flex;align-items:center;justify-content:space-between;gap:8px}
.mteam{flex:1;font-size:14px;font-weight:600}.mteam.r{text-align:right}

.esub{font-size:12px;color:#6ee7b7;margin-top:4px}

.ename{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.next-card .nteam{flex:1}
.next-card .nteam.r{text-align:right}
.next-card .nvs{color:#fbbf24;font-weight:900;padding:0 8px}

.filter-tabs button.active{background:#fbbf24;color:#052e1f;border-color:#fbbf24}

var adminCurFilter="andamento";

function getDraft(){
if(!adminDraft){adminDraft={g:JSON.parse(JSON.stringify(R.g||{})),k:JSON.parse(JSON.stringify(R.k||{})),e:JSON.parse(JSON.stringify(R.e||{vice:null,camp:null,art:""})),art_gols:JSON.parse(JSON.stringify(R.art_gols||[]))}}
return adminDraft
}

function renderAdmin(el){
if(!adminAuth()){
el.innerHTML='<div class="admin-section"><h3>\u{1F510} Acesso restrito</h3><p style="font-size:13px;color:#a7f3d0;margin-bottom:8px">Digite a senha para gerenciar os resultados.</p><input type="password" class="admin-input" id="pinInput" placeholder="Senha"><button class="admin-btn" style="margin-top:8px" id="pinBtn">Entrar</button></div>';
document.getElementById("pinBtn").onclick=function(){
var v=document.getElementById("pinInput").value;
var h=0;for(var i=0;i<v.length;i++){h=((h<<5)-h)+v.charCodeAt(i);h|=0}
if(h===ADMIN_PIN_HASH){setAdminAuth(true);renderAdmin(el)}
else{toast("Senha incorreta",true)}
};
document.getElementById("pinInput").onkeypress=function(e){if(e.key==="Enter")document.getElementById("pinBtn").click()};
return}

// Authenticated admin view
var hasToken=getToken().length>0;
var h='<div class="admin-section"><h3>\u{1F511} Token do GitHub</h3>';
if(hasToken){h+='<p style="font-size:12px;color:#a7f3d0;margin-bottom:6px">Token configurado \u2705 (sal\u200bvo neste dispositivo).</p><button class="admin-btn secondary" id="rmTokenBtn">Remover token</button>'}
else{h+='<p style="font-size:12px;color:#a7f3d0;margin-bottom:6px">Cole aqui o token do GitHub (s\u00f3 na primeira vez ou em um novo dispositivo).</p><input type="password" class="admin-input" id="tokenInput" placeholder="ghp_...">  <button class="admin-btn" style="margin-top:6px" id="setTokenBtn">Salvar token</button>'}
h+='<button class="admin-btn secondary" style="margin-left:8px;margin-top:6px" id="logoutBtn">Sair do Admin</button></div>';

// Filtros para mostrar jogos a editar
var filters=[["andamento","Em andamento"],["proximos","Pr\u00f3ximos"],["finalizados","Finalizados"]];
h+='<div class="filter-tabs">'+filters.map(function(f){return '<button class="'+(f[0]===adminCurFilter?"active":"")+'" data-af="'+f[0]+'">'+f[1]+'</button>'}).join("")+'</div>';

h+='<div id="adminMatches"></div>';
h+='<div style="position:sticky;bottom:0;background:linear-gradient(180deg,transparent,#052e1f 30%);padding:16px 0 0;margin-top:16px"><button class="admin-btn" style="width:100%;padding:12px" id="saveBtn">\u{1F4BE} Publicar altera\u00e7\u00f5es no GitHub</button></div>';

el.innerHTML=h;

if(hasToken){document.getElementById("rmTokenBtn").onclick=function(){setToken("");renderAdmin(el)}}
else{document.getElementById("setTokenBtn").onclick=function(){var v=document.getElementById("tokenInput").value.trim();if(v){setToken(v);renderAdmin(el);toast("Token salvo")}}}
document.getElementById("logoutBtn").onclick=function(){setAdminAuth(false);renderAdmin(el)};

document.querySelectorAll(".filter-tabs button[data-af]").forEach(function(b){b.onclick=function(){adminCurFilter=b.dataset.af;document.querySelectorAll(".filter-tabs button[data-af]").forEach(function(b2){if(b2.dataset.af===adminCurFilter)b2.classList.add("active");else b2.classList.remove("active")});renderAdminMatches()}});

document.getElementById("saveBtn").onclick=publishToGithub;

renderAdminMatches()
}

function renderAdminMatches(){
var container=document.getElementById("adminMatches");
var draft=getDraft();
var now=new Date();
var today=now.toDateString();

var matches=[];
FX.forEach(function(fx,i){
var r=draft.g[String(i)];
var d=parseFxDate(fx[1],fx[2]);
matches.push({type:"g",idx:i,grupo:fx[0].split(" ").pop(),data:fx[1],hora:fx[2],home:T[fx[3]],away:T[fx[4]],homeIdx:fx[3],awayIdx:fx[4],r:r,d:d})});

matches.sort(function(a,b){return a.d-b.d});

var filtered=matches.filter(function(m){
var st=m.r&&m.r[2];
var isFinal=st==="f",isLive=st==="l";
if(adminCurFilter==="proximos")return !isFinal&&!isLive&&m.d>now;
if(adminCurFilter==="andamento")return isLive||(!isFinal&&m.d<=now);
if(adminCurFilter==="finalizados")return isFinal;
return false});

if(filtered.length===0){container.innerHTML='<p class="note">Nenhum jogo nessa categoria.</p>';return}

var h="";
filtered.forEach(function(m){
var r=m.r||[null,null,null];
var hs=r[0],as_=r[1],st=r[2]||"p";
var isFinal=st==="f",isLive=st==="l";
var needsAttention=adminCurFilter==="andamento"&&!isFinal&&!isLive&&m.d<=now;
h+='<div class="admin-match"'+(needsAttention?' style="border-color:#fbbf24;border-width:2px"':'')+'><div style="font-size:11px;color:#fbbf24;margin-bottom:6px"><span class="grp-tag">'+m.grupo+'</span>'+m.data+' \u00b7 '+m.hora+(needsAttention?' \u00b7 <span style="color:#fbbf24">\u26a0\ufe0f hor\u00e1rio j\u00e1 passou</span>':'')+'</div>';
h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px"><span style="flex:1;text-align:right;font-weight:600;font-size:14px">'+m.home+'</span>';
h+='<input type="number" min="0" class="admin-input score-input" data-gi="'+m.idx+'" data-side="0" value="'+(hs!=null?hs:"")+'">';
h+='<span style="color:#fbbf24">\u00d7</span>';
h+='<input type="number" min="0" class="admin-input score-input" data-gi="'+m.idx+'" data-side="1" value="'+(as_!=null?as_:"")+'">';
h+='<span style="flex:1;font-weight:600;font-size:14px">'+m.away+'</span></div>';
h+='<div style="display:flex;gap:4px;justify-content:center;margin-bottom:8px">';
h+='<button class="status-pill '+(st==="l"?"active live":"")+'" data-stg="'+m.idx+'" data-st="l">Em andamento</button>';
h+='<button class="status-pill '+(st==="f"?"active final":"")+'" data-stg="'+m.idx+'" data-st="f">Finalizado</button>';
h+='</div>';
// Gols - mostrar/editar
if(st==="l"||st==="f"||needsAttention){
var golsDesseJogo=[];
(draft.art_gols||[]).forEach(function(g,gi){
if(g[3]===m.idx)golsDesseJogo.push({gi:gi,nome:g[0],time:g[1],gols:g[2]})
});
h+='<div style="border-top:1px solid #047857;padding-top:8px"><p style="font-size:11px;color:#fbbf24;margin-bottom:6px">Gols deste jogo</p>';
golsDesseJogo.forEach(function(gg){
h+='<div class="gol-row"><span style="font-size:12px;flex:1">'+gg.nome+' ('+T[gg.time]+') - '+gg.gols+' gol(s)</span><button data-rmgol="'+gg.gi+'">Remover</button></div>'
});
var defTeam=m.homeIdx;
if(hs!=null&&as_!=null){if(hs>as_)defTeam=m.homeIdx;else if(as_>hs)defTeam=m.awayIdx}
h+='<div style="margin-top:6px"><div style="display:flex;gap:6px;margin-bottom:6px"><input type="text" class="admin-input" style="flex:1;font-size:16px;padding:8px" placeholder="Nome do jogador" id="golNome_'+m.idx+'"></div>';
h+='<div style="display:flex;gap:6px;align-items:center"><select class="admin-input" style="flex:1" id="golTime_'+m.idx+'"><option value="'+m.homeIdx+'"'+(defTeam===m.homeIdx?' selected':'')+'>'+m.home+'</option><option value="'+m.awayIdx+'"'+(defTeam===m.awayIdx?' selected':'')+'>'+m.away+'</option></select><input type="number" min="1" max="9" class="admin-input score-input" placeholder="1" id="golQtd_'+m.idx+'" value="1" style="width:50px"><button class="admin-btn" style="padding:6px 14px;font-size:13px" data-addgol="'+m.idx+'">Adicionar</button></div></div></div>';
}
h+='</div>'
});
container.innerHTML=h;

// Event handlers
container.querySelectorAll('input.score-input').forEach(function(inp){
inp.onchange=function(){
var gi=this.dataset.gi,side=parseInt(this.dataset.side);
var draft=getDraft();
var cur=draft.g[gi]||[null,null,"p"];
cur[side]=this.value===""?null:parseInt(this.value);
draft.g[gi]=cur;
}
});
container.querySelectorAll('button.status-pill').forEach(function(btn){
btn.onclick=function(){
var gi=this.dataset.stg,st=this.dataset.st;
var draft=getDraft();
var cur=draft.g[gi]||[null,null,"p"];
cur[2]=(cur[2]===st?"p":st);
draft.g[gi]=cur;
renderAdminMatches()
}
});
container.querySelectorAll('button[data-addgol]').forEach(function(btn){
btn.onclick=function(){
var gi=this.dataset.addgol;
var nome=document.getElementById("golNome_"+gi).value.trim();
var time=parseInt(document.getElementById("golTime_"+gi).value);
var qtd=parseInt(document.getElementById("golQtd_"+gi).value)||1;
if(!nome){toast("Digite o nome do jogador",true);return}
var draft=getDraft();
draft.art_gols=draft.art_gols||[];
draft.art_gols.push([nome,time,qtd,parseInt(gi)]);
renderAdminMatches()
}
});
container.querySelectorAll('button[data-rmgol]').forEach(function(btn){
btn.onclick=function(){
var idx=parseInt(this.dataset.rmgol);
var draft=getDraft();
draft.art_gols.splice(idx,1);
renderAdminMatches()
}
});
}

function publishToGithub(){
var token=getToken();
if(!token){toast("Configure o token primeiro",true);return}
var draft=getDraft();
var btn=document.getElementById("saveBtn");
btn.disabled=true;btn.textContent="\u{23F3} Publicando\u2026";

// Apply draft to R locally first
R.g=draft.g;R.k=draft.k;R.e=draft.e;R.art_gols=draft.art_gols;

// Build new full HTML
var currentHtml=document.documentElement.outerHTML;

// Replace the R block in currentHtml
var newR='"R":'+JSON.stringify({g:R.g,k:R.k,e:R.e,art_gols:R.art_gols});
var newHtml=currentHtml.replace(/"R":\{[^}]*"g":\{[^}]*\}[^}]*"k":\{[^}]*\}[^}]*"e":\{[^}]*\}[^}]*"art_gols":\[[^\]]*\][^}]*\}/, newR);

// Add doctype
if(!newHtml.startsWith("<!DOCTYPE"))newHtml="<!DOCTYPE html>\n"+newHtml;

// Fetch current file SHA
var apiUrl="https://api.github.com/repos/"+GH_OWNER+"/"+GH_REPO+"/contents/"+GH_FILE+"?ref="+GH_BRANCH;
fetch(apiUrl,{headers:{Authorization:"token "+token,Accept:"application/vnd.github.v3+json"}})
.then(function(res){if(!res.ok)throw new Error("Erro ao buscar arquivo: "+res.status);return res.json()})
.then(function(data){
var sha=data.sha;
// utf-8 to base64 (handle unicode)
var b64=btoa(unescape(encodeURIComponent(newHtml)));
return fetch(apiUrl.split("?")[0],{
method:"PUT",
headers:{Authorization:"token "+token,Accept:"application/vnd.github.v3+json","Content-Type":"application/json"},
body:JSON.stringify({message:"Atualizar resultados via Admin",content:b64,sha:sha,branch:GH_BRANCH})
})
})
.then(function(res){if(!res.ok)return res.json().then(function(e){throw new Error(e.message||"Erro "+res.status)});return res.json()})
.then(function(){
adminDraft=null;
btn.disabled=false;btn.textContent="\u{1F4BE} Publicar altera\u00e7\u00f5es no GitHub";
toast("Publicado! O site vai atualizar em ~1 minuto.");
})
.catch(function(err){
btn.disabled=false;btn.textContent="\u{1F4BE} Publicar altera\u00e7\u00f5es no GitHub";
toast("Erro: "+err.message,true);
});
}

renderNav();renderMain();
</script>
</body>
